# ─── SUIKA X — docker-compose.yml ───────────────────────────────────────────
# Production multi-service deployment.
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:
  suika:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: suika-core
    restart: unless-stopped
    ports:
      - "81:81"    # Caddy gateway (external)
      - "3000:3000" # Next.js web (internal, can be exposed for debugging)
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/suika.db
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ZAI_API_KEY=${ZAI_API_KEY:-}
      - SUIKA_AUTH_USER=${SUIKA_AUTH_USER:-admin}
      - SUIKA_AUTH_PASSWORD=${SUIKA_AUTH_PASSWORD:-suika-admin-2024}
      - SUIKA_JWT_SECRET=${SUIKA_JWT_SECRET:-change-me-in-production}
    volumes:
      - suika-data:/app/data
      - ./prisma:/app/prisma:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/suika/system"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: PostgreSQL for production-scale deployments (replace SQLite)
  # postgres:
