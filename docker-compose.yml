  #     POSTGRES_DB: suika
  #     POSTGRES_USER: suika
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-suika}
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

  # Optional: Redis for caching + rate limiting
  # redis:
  #   image: redis:7-alpine
  #   container_name: suika-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"

volumes:
  suika-data:
    driver: local
